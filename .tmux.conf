# ===========================================================================
# tmux config
# ===========================================================================

# ---------------------------------------------------------------------------
# Terminal & colors
# ---------------------------------------------------------------------------
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# OSC 52 clipboard passthrough (macOS pbcopy)
set -g set-clipboard on
set -ga terminal-overrides ',*:Ms=\E]52;c;%p2%s\a'

# ---------------------------------------------------------------------------
# General
# ---------------------------------------------------------------------------
set -g mouse on
set -g history-limit 50000
set -sg escape-time 10          # fast escape in neovim
set -g focus-events on          # required for nvim FocusGained autocmd

# Pass Shift+Enter through to apps (CSI u encoding for Ghostty)
bind -n S-Enter send-keys Escape "[13;2u"
set-option -g renumber-windows on

# ---------------------------------------------------------------------------
# Vi copy mode
# ---------------------------------------------------------------------------
setw -g mode-keys vi
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi y   send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Escape send -X cancel

# ---------------------------------------------------------------------------
# Plugins (TPM)
# ---------------------------------------------------------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'

run '~/.tmux/plugins/tpm/tpm'
